<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Warmup</title>
<style>
	:root { color-scheme: light dark; }
	body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
	.header-row { display: flex; justify-content: space-between; align-items: center; }
	h1 { font-size: 1.3rem; margin: 0; }
	.lang-switch { display: flex; gap: .3rem; }
	.lang-switch button { font-size: .8rem; font-weight: 600; padding: .3rem .5rem; border-radius: 6px; border: 1px solid transparent; background: none; cursor: pointer; opacity: .45; line-height: 1; }
	.lang-switch button.active { opacity: 1; border-color: #8884; }
	.icon-btn { font-size: 1.2rem; padding: .1rem .4rem; border-radius: 6px; border: 1px solid transparent; background: none; cursor: pointer; opacity: .7; line-height: 1; }
	.icon-btn:hover { opacity: 1; border-color: #8884; }
	.icon-btn.on { opacity: 1; }
	fieldset { border: 1px solid #8884; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
	legend { padding: 0 .5rem; font-weight: 600; }
	label { display: flex; align-items: center; gap: .5rem; margin-bottom: .6rem; }
	input[type=time] { font-size: 1rem; padding: .2rem; }
	button.action { font-size: 1rem; padding: .5rem 1rem; border-radius: 6px; border: 1px solid #8884; cursor: pointer; }
	button.primary { background: #6c47ff; color: #fff; border: none; }
	#status { padding: .8rem; border-radius: 8px; background: #8881; margin-bottom: 1rem; font-size: .95rem; }
	#status.active { background: #2ecc7133; }
	#status.expired { background: #e67e2233; }
	.row { display: flex; gap: .6rem; }
	.muted { opacity: .65; font-size: .85rem; }
	.bar-track { background: #8883; border-radius: 5px; height: 10px; overflow: hidden; margin: .3rem 0 .5rem; }
	.bar-fill { background: #6c47ff; height: 100%; transition: width .3s; }
	.bar-fill.warn { background: #e67e22; }
	.bar-fill.crit { background: #e74c3c; }
	.res-row { display: flex; justify-content: space-between; font-size: .9rem; margin-top: .8rem; }
	.res-row:first-child { margin-top: 0; }
	input[type=password] { font-size: 1rem; padding: .5rem; width: 100%; box-sizing: border-box; margin-bottom: .6rem; }
	#gate-error { color: #e74c3c; font-size: .85rem; min-height: 1.2em; }
</style>
</head>
<body>
	<div class="header-row">
		<h1>⚡ Claude Warmup</h1>
		<div class="lang-switch">
			<button class="icon-btn" id="lock-btn" title="">🔓</button>
			<button id="lang-de" title="Deutsch">DE</button>
			<button id="lang-en" title="English">EN</button>
		</div>
	</div>
	<p class="muted" data-i18n="intro"></p>

	<fieldset id="gate" style="display:none">
		<legend data-i18n="gateTitle"></legend>
		<p class="muted" data-i18n="gateHint"></p>
		<input type="password" id="gate-pw" autocomplete="current-password">
		<button class="action primary" id="gate-submit" data-i18n="gateSubmit"></button>
		<div id="gate-error"></div>
	</fieldset>

	<div id="app" style="display:none">
		<div id="status">…</div>

		<fieldset>
			<legend data-i18n="resTitle"></legend>
			<div class="res-row"><span data-i18n="res5h"></span><span id="res-5h-pct">–</span></div>
			<div class="bar-track"><div class="bar-fill" id="res-5h-bar" style="width:0%"></div></div>
			<div class="muted" id="res-5h-end">–</div>

			<div class="res-row"><span data-i18n="res7d"></span><span id="res-7d-pct">–</span></div>
			<div class="bar-track"><div class="bar-fill" id="res-7d-bar" style="width:0%"></div></div>
			<div class="muted" id="res-7d-end">–</div>
		</fieldset>

		<fieldset>
			<legend data-i18n="modeTitle"></legend>
			<label><input type="checkbox" id="enabled"> <span data-i18n="enabledLabel"></span></label>
			<label><input type="radio" name="mode" value="keepwarm" id="mode-keepwarm"> <span data-i18n="modeKeepwarm"></span></label>
			<label><input type="radio" name="mode" value="fixed" id="mode-fixed"> <span data-i18n="modeFixed"></span></label>
			<div class="row" style="margin-left:1.6rem">
				<input type="time" id="fixed-time" value="00:01">
			</div>
		</fieldset>

		<div class="row">
			<button class="action primary" id="save" data-i18n="saveBtn"></button>
			<button class="action" id="trigger" data-i18n="triggerBtn"></button>
		</div>

		<p class="muted" id="log"></p>

		<fieldset id="sec-panel" style="display:none">
			<legend data-i18n="secTitle"></legend>
			<p class="muted" id="sec-state"></p>
			<input type="password" id="sec-newpw" autocomplete="new-password">
			<div class="row">
				<button class="action primary" id="sec-set" data-i18n="secSetBtn"></button>
				<button class="action" id="sec-remove" data-i18n="secRemoveBtn" style="display:none"></button>
			</div>
		</fieldset>
	</div>

<script>
const $ = (id) => document.getElementById(id);

const translations = {
	de: {
		intro: "Hält das rollierende 5h-Nutzungsfenster deines Claude-Abos aktiv, per offiziellem Long-Lived-Token (claude setup-token).",
		loading: "Lade Status…",
		resTitle: "Ressourcen-Verbrauch",
		res5h: "5-Stunden-Fenster",
		res7d: "7-Tage-Fenster",
		modeTitle: "Modus",
		enabledLabel: "Aktiv",
		modeKeepwarm: "Durchgehend warmhalten (empfohlen)",
		modeFixed: "Feste Uhrzeit täglich",
		saveBtn: "Speichern",
		triggerBtn: "Jetzt sofort pingen",
		disabled: "⏸ Deaktiviert.",
		active: "✅ Fenster aktiv — läuft ab in ",
		expiredKeepwarm: "⏳ Fenster abgelaufen — wird beim nächsten Check (max. 5 Min) automatisch neu gestartet.",
		expiredFixed: "⏳ Fenster abgelaufen — nächster Start um ",
		clockSuffix: " Uhr.",
		accountStatus: " ⚠ Account-Status: ",
		noData: "keine Daten",
		noPingYet: "Noch kein Ping gesendet.",
		resetLabel: "Reset: ",
		statusLoadError: "⚠ Status konnte nicht geladen werden.",
		saved: "Gespeichert ",
		sending: "Sende Ping…",
		triggered: "Manuell ausgelöst ",
		locale: "de-DE",
		gateTitle: "Zugang",
		gateHint: "Diese Seite ist mit einem Passwort geschützt.",
		gateSubmit: "Entsperren",
		gateWrong: "Falsches Passwort.",
		secTitle: "Zugriffsschutz",
		secOff: "Kein Passwort gesetzt — jeder im Netzwerk kann diese Seite öffnen und Einstellungen ändern.",
		secOn: "Passwortschutz aktiv.",
		secNewPwPlaceholder: "Neues Passwort (leer = kein Schutz)",
		secSetBtn: "Setzen",
		secRemoveBtn: "Schutz entfernen",
		secSetOk: "Passwort gesetzt.",
		secRemoveOk: "Schutz entfernt."
	},
	en: {
		intro: "Keeps your Claude subscription's rolling 5h usage window warm, via the official long-lived token (claude setup-token).",
		loading: "Loading status…",
		resTitle: "Resource usage",
		res5h: "5-hour window",
		res7d: "7-day window",
		modeTitle: "Mode",
		enabledLabel: "Enabled",
		modeKeepwarm: "Keep warm continuously (recommended)",
		modeFixed: "Fixed time daily",
		saveBtn: "Save",
		triggerBtn: "Ping now",
		disabled: "⏸ Disabled.",
		active: "✅ Window active — expires in ",
		expiredKeepwarm: "⏳ Window expired — will restart automatically on the next check (max. 5 min).",
		expiredFixed: "⏳ Window expired — next start at ",
		clockSuffix: ".",
		accountStatus: " ⚠ Account status: ",
		noData: "no data",
		noPingYet: "No ping sent yet.",
		resetLabel: "Resets: ",
		statusLoadError: "⚠ Could not load status.",
		saved: "Saved ",
		sending: "Sending ping…",
		triggered: "Triggered manually ",
		locale: "en-US",
		gateTitle: "Access",
		gateHint: "This page is password-protected.",
		gateSubmit: "Unlock",
		gateWrong: "Wrong password.",
		secTitle: "Access protection",
		secOff: "No password set — anyone on the network can open this page and change settings.",
		secOn: "Password protection active.",
		secNewPwPlaceholder: "New password (empty = no protection)",
		secSetBtn: "Set",
		secRemoveBtn: "Remove protection",
		secSetOk: "Password set.",
		secRemoveOk: "Protection removed."
	}
};

let lang = localStorage.getItem("cw_lang") || (navigator.language.startsWith("de") ? "de" : "en");
let lastStatus = null;

function t(key) { return translations[lang][key]; }

function applyStaticI18n() {
	document.documentElement.lang = lang;
	document.querySelectorAll("[data-i18n]").forEach(el => {
		el.textContent = t(el.getAttribute("data-i18n"));
	});
	$("lang-de").className = lang === "de" ? "active" : "";
	$("lang-en").className = lang === "en" ? "active" : "";
	if (lastStatus) renderStatus(lastStatus); else $("status").textContent = t("loading");
}

function setLang(newLang) {
	lang = newLang;
	localStorage.setItem("cw_lang", lang);
	applyStaticI18n();
}

$("lang-de").addEventListener("click", () => setLang("de"));
$("lang-en").addEventListener("click", () => setLang("en"));

function fmt(sec) {
	if (sec <= 0) return "0:00:00";
	const h = Math.floor(sec / 3600);
	const m = Math.floor((sec % 3600) / 60);
	const s = sec % 60;
	return h + ":" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function fmtClock(epochSec) {
	if (!epochSec) return "–";
	return new Date(epochSec * 1000).toLocaleString(t("locale"), { weekday: 'short', hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
}

function barClass(pct) {
	if (pct >= 90) return "bar-fill crit";
	if (pct >= 70) return "bar-fill warn";
	return "bar-fill";
}

function renderStatus(s) {
	lastStatus = s;
	const el = $("status");
	if (!s.enabled) {
		el.className = "";
		el.textContent = t("disabled");
	} else if (s.active) {
		el.className = "active";
		el.textContent = t("active") + fmt(s.remaining_seconds);
	} else {
		el.className = "expired";
		el.textContent = s.mode === "keepwarm"
			? t("expiredKeepwarm")
			: t("expiredFixed") + String(s.fixed_hour).padStart(2,'0') + ":" + String(s.fixed_minute).padStart(2,'0') + t("clockSuffix");
	}
	if (s.account_status && s.account_status !== "allowed" && s.account_status !== "unknown") {
		el.textContent += t("accountStatus") + s.account_status;
	}
	$("enabled").checked = s.enabled;
	$("mode-keepwarm").checked = s.mode === "keepwarm";
	$("mode-fixed").checked = s.mode === "fixed";
	$("fixed-time").value = String(s.fixed_hour).padStart(2,'0') + ":" + String(s.fixed_minute).padStart(2,'0');

	const pct5h = Math.round((s.utilization || 0) * 100);
	$("res-5h-pct").textContent = s.window_end ? pct5h + "%" : t("noData");
	$("res-5h-bar").style.width = pct5h + "%";
	$("res-5h-bar").className = barClass(pct5h);
	$("res-5h-end").textContent = s.window_end ? t("resetLabel") + fmtClock(s.window_end) : t("noPingYet");

	const pct7d = Math.round((s.utilization7d || 0) * 100);
	$("res-7d-pct").textContent = s.window7d_end ? pct7d + "%" : t("noData");
	$("res-7d-bar").style.width = pct7d + "%";
	$("res-7d-bar").className = barClass(pct7d);
	$("res-7d-end").textContent = s.window7d_end ? t("resetLabel") + fmtClock(s.window7d_end) : t("noPingYet");

	$("sec-state").textContent = s.protected ? t("secOn") : t("secOff");
	$("sec-remove").style.display = s.protected ? "inline-block" : "none";
	$("lock-btn").textContent = s.protected ? "🔒" : "🔓";
	$("lock-btn").className = "icon-btn" + (s.protected ? " on" : "");
	$("lock-btn").title = t("secTitle");
}

function toggleSecPanel() {
	const panel = $("sec-panel");
	panel.style.display = panel.style.display === "none" ? "block" : "none";
}

let authKey = localStorage.getItem("cw_auth") || "";

function showGate(errorMsg) {
	$("app").style.display = "none";
	$("gate").style.display = "block";
	$("gate-error").textContent = errorMsg || "";
}

function showApp() {
	$("gate").style.display = "none";
	$("app").style.display = "block";
}

function apiCall(action, extraParams) {
	const qs = `action=${action}${extraParams ? "&" + extraParams : ""}&auth=${encodeURIComponent(authKey)}`;
	return fetch("/cgi-bin/claudewarmup?" + qs).then(r => {
		if (r.status === 403) {
			localStorage.removeItem("cw_auth");
			authKey = "";
			showGate(t("gateWrong"));
			return Promise.reject(new Error("unauthorized"));
		}
		return r.json();
	});
}

function refresh() {
	apiCall("status")
		.then(s => { showApp(); renderStatus(s); })
		.catch(() => {});
}

$("gate-submit").addEventListener("click", () => {
	authKey = $("gate-pw").value;
	apiCall("status")
		.then(s => {
			localStorage.setItem("cw_auth", authKey);
			showApp();
			renderStatus(s);
		})
		.catch(() => {});
});

$("gate-pw").addEventListener("keydown", (ev) => {
	if (ev.key === "Enter") $("gate-submit").click();
});

$("save").addEventListener("click", () => {
	const mode = document.querySelector('input[name=mode]:checked').value;
	const [h, m] = $("fixed-time").value.split(":");
	const enabled = $("enabled").checked ? 1 : 0;
	apiCall("set", `mode=${mode}&hour=${parseInt(h,10)}&minute=${parseInt(m,10)}&enabled=${enabled}`)
		.then(s => { renderStatus(s); $("log").textContent = t("saved") + new Date().toLocaleTimeString(); })
		.catch(() => {});
});

$("trigger").addEventListener("click", () => {
	$("log").textContent = t("sending");
	apiCall("trigger")
		.then(s => { renderStatus(s); $("log").textContent = t("triggered") + new Date().toLocaleTimeString(); })
		.catch(() => {});
});

$("lock-btn").addEventListener("click", toggleSecPanel);

$("sec-set").addEventListener("click", () => {
	const pw = $("sec-newpw").value;
	if (!pw) return;
	apiCall("setpw", `newpw=${encodeURIComponent(pw)}`)
		.then(s => {
			authKey = pw;
			localStorage.setItem("cw_auth", authKey);
			renderStatus(s);
			$("sec-newpw").value = "";
			$("log").textContent = t("secSetOk");
			toggleSecPanel();
		})
		.catch(() => {});
});

$("sec-remove").addEventListener("click", () => {
	apiCall("setpw", "newpw=")
		.then(s => {
			authKey = "";
			localStorage.removeItem("cw_auth");
			renderStatus(s);
			$("log").textContent = t("secRemoveOk");
			toggleSecPanel();
		})
		.catch(() => {});
});

applyStaticI18n();
refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
